<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Scaffold Organizer settings page</title>
  <desc id="desc">Illustrated settings page with account card, personal prompt, calendar settings, status, and archived items.</desc>
  <rect width="1200" height="760" fill="#f7fbff"/>
  <text x="26" y="42" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#25272c">Scaffold Organizer</text>
  <g transform="translate(24 82)" font-family="Arial, sans-serif" font-size="13" font-weight="700">
    <rect width="1152" height="44" rx="18" fill="#ffffff" stroke="#d8e1eb"/>
    <text x="20" y="27" fill="#717783">Inbox</text>
    <text x="102" y="27" fill="#717783">Active</text>
    <text x="196" y="27" fill="#717783">Calendar</text>
    <rect x="300" y="8" width="84" height="28" rx="14" fill="#63c7ff" stroke="#25272c"/>
    <text x="318" y="27" fill="#25272c">Settings</text>
  </g>

  <g transform="translate(164 148)" font-family="Arial, sans-serif">
    <rect x="6" y="6" width="872" height="524" rx="24" fill="#63c7ff"/>
    <rect width="872" height="524" rx="24" fill="#ffffff" stroke="#25272c"/>

    <g transform="translate(28 28)">
      <rect width="816" height="78" rx="18" fill="#f8fbff" stroke="#d8e1eb"/>
      <text x="20" y="28" font-size="11" font-weight="800" fill="#2f9fd3">ACCOUNT</text>
      <text x="20" y="56" font-size="22" font-weight="800" fill="#25272c">No nickname</text>
      <text x="610" y="52" font-size="12" fill="#717783">user@example.com</text>
    </g>

    <g transform="translate(28 132)">
      <text x="0" y="0" font-size="13" font-weight="800" fill="#25272c">Nickname</text>
      <rect x="0" y="12" width="816" height="42" rx="14" fill="#f8fbff" stroke="#d8e1eb"/>
      <text x="18" y="39" font-size="13" fill="#8aa0ad">Add a display name</text>
    </g>

    <g transform="translate(28 208)">
      <text x="0" y="0" font-size="13" font-weight="800" fill="#25272c">Personal prompt</text>
      <rect x="0" y="12" width="816" height="104" rx="16" fill="#f8fbff" stroke="#d8e1eb"/>
      <text x="18" y="42" font-size="13" fill="#717783">When I say I am tired, split the first action into a tiny step.</text>
      <text x="18" y="68" font-size="13" fill="#717783">Group outputs by project and keep next actions concrete.</text>
    </g>

    <g transform="translate(28 348)">
      <text x="0" y="0" font-size="13" font-weight="800" fill="#25272c">Calendar week starts on</text>
      <rect x="0" y="12" width="240" height="42" rx="14" fill="#f8fbff" stroke="#d8e1eb"/>
      <text x="18" y="39" font-size="13" fill="#25272c">Monday</text>
      <rect x="280" y="12" width="130" height="42" rx="18" fill="#63c7ff" stroke="#25272c"/>
      <text x="306" y="39" font-size="13" font-weight="800" fill="#25272c">Save Settings</text>
      <rect x="430" y="12" width="110" height="42" rx="18" fill="#ffffff" stroke="#25272c"/>
      <text x="456" y="39" font-size="13" font-weight="800" fill="#25272c">User Guide</text>
    </g>

    <g transform="translate(28 430)">
      <rect width="816" height="58" rx="18" fill="#ffffff" stroke="#d8e1eb"/>
      <text x="20" y="36" font-size="13" font-weight="800" fill="#20a675">Backend: Active</text>
      <text x="180" y="36" font-size="13" font-weight="800" fill="#20a675">AI: Ready</text>
      <text x="300" y="36" font-size="13" font-weight="800" fill="#717783">Storage: Supabase</text>
    </g>
  </g>

  <g transform="translate(164 704)" font-family="Arial, sans-serif">
    <text x="0" y="0" font-size="18" font-weight="800" fill="#25272c">Archived items</text>
    <text x="150" y="0" font-size="13" fill="#717783">Items can be restored before automatic cleanup.</text>
  </g>
</svg>
